<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aryanshh Srivastava — Creative Developer & Designer</title>
  <meta name="description"
    content="Portfolio of Aryanshh Srivastava — a creative developer crafting bold, immersive digital experiences at the intersection of design and technology.">
  <meta property="og:title" content="Aryanshh Srivastava — Creative Developer & Designer">
  <meta property="og:description"
    content="Bold, immersive digital experiences at the intersection of design and technology.">
  <meta property="og:type" content="website">

  <!-- Fonts -->
  <link rel="stylesheet"
    href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@900,800,700&f[]=satoshi@400,700&display=swap">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
  <!-- Three.js & Anime.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>

<body>


  <!-- ═══ Custom Cursor ═══ -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursor-follower"></div>

  <!-- ═══ Grain Overlay ═══ -->
  <div class="grain-overlay" aria-hidden="true">
    <svg>
      <filter id="grain-filter">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
        <feColorMatrix type="saturate" values="0" />
      </filter>
      <rect width="100%" height="100%" filter="url(#grain-filter)" />
    </svg>
  </div>

  <!-- ═══ Mesh Blobs ═══ -->
  <div class="blobs-container" aria-hidden="true">
    <div class="blob blob-1" id="blob-1"></div>
    <div class="blob blob-2" id="blob-2"></div>
    <div class="blob blob-3" id="blob-3"></div>
  </div>

  <!-- ═══ Page Loader ═══ -->
  <div class="loader" id="loader">
    <div class="loader-orb"></div>
    <div class="loader-counter" id="loader-counter">00</div>
    <div class="loader-status" id="loader-status">INITIALIZING EXPERIENCE</div>
  </div>

  <!-- ═══ Fixed Header ═══ -->
  <header class="header" id="header">
    <a href="#" class="header-logo" id="header-logo" data-hover>AS.</a>
    <button class="header-menu-btn" id="menu-btn" data-hover aria-label="Toggle navigation menu">
      <span class="header-menu-label">MENU</span>
      <span class="header-menu-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </span>
    </button>
  </header>

  <!-- ═══ Circular Navigation Overlay ═══ -->
  <nav class="nav-overlay" id="nav-overlay" aria-hidden="true">
    <div class="nav-links">
      <a href="index.html" class="nav-link" data-hover data-preview="assets/project-1.png">Home</a>
      <a href="about.html" class="nav-link" data-hover data-preview="assets/about.png">About</a>
      <a href="projects.html" class="nav-link" data-hover data-preview="assets/project-2.png">Projects</a>
      <a href="design.html" class="nav-link" data-hover data-preview="assets/project-4.png">Design</a>
      <a href="connect.html" class="nav-link" data-hover data-preview="assets/project-3.png">Connect</a>
    </div>
    <div class="nav-preview" id="nav-preview">
      <img src="assets/project-1.png" alt="Preview" id="nav-preview-img" loading="lazy">
    </div>
  </nav>

  <!-- ═══ Main Content ═══ -->
  <main class="page-wrapper">
    <!-- Global 3D Background -->
    <div id="global-3d-bg"></div>
    <!-- Section 0: Hero -->
    <section class="section section-active" id="section-0" data-section-name="Home">
      <div class="section-inner hero">
        <div class="hero-blob-accent" aria-hidden="true"></div>
        <span class="hero-tag">DESIGNER x DEVELOPER</span>
        <h1 class="hero-title">
          <span class="hero-title-line"><span>ARYANSHH</span></span>
          <span class="hero-title-line outline-text"><span>SRIVASTAVA</span></span>
        </h1>
        <p class="hero-description"> Two Liner</p>

        <a href="https://drive.google.com/file/d/1UBH7rvxEZbnxc_uGx9mLhRQgvNgeUcpz/view?usp=sharing" target="_blank" class="hero-resume-btn" data-hover>
          <span>VIEW RESUME</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 7h10v10M7 17L17 7" />
          </svg>
        </a>
      </div>
    </section>
  </main>

  <div class="progress-indicator" id="progress-indicator">
    <span class="progress-current" id="progress-current">01</span>
    <div class="progress-line" id="progress-line"></div>
    <span class="progress-total">05</span>
  </div>


  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/gsap.min.js"></script>
  <!-- Main Script -->
  <script src="main.js"></script>
</body>

</html>
